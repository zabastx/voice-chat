name: ci

on: push

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

  build-push:
    needs: ci
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Notify Telegram on failure
        if: failure()
        uses: proDreams/actions-telegram-notifier@v3.0.0
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          status: failure
          message: "CI failed on ${{ github.repository }} — commit ${{ github.sha }}"
          notify_fields: "actor,repository,workflow"

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: zabastx.cr.cloud.ru
          username: ${{ secrets.REGISTRY_KEY_ID }}
          password: ${{ secrets.REGISTRY_KEY_SECRET }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: zabastx.cr.cloud.ru/chat
          tags: |
            type=raw,value=latest
            type=sha

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
