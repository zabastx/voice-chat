services:
  app:
    image: zabastx.cr.cloud.ru/chat:latest
    restart: unless-stopped
    env_file: .env
    # loopback only — Caddy terminates TLS, LiveKit (host network) delivers webhooks here
    ports:
      - '127.0.0.1:3000:3000'
    volumes:
      # kept only for the legacy SQLite file (read by scripts/migrate-sqlite-to-pg.ts
      # during the Postgres cutover); safe to drop once the migration is done
      - app-data:/data
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    # no published ports — reachable only on the compose network as "postgres"
    # (.env: NUXT_DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/voicechat)
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: voicechat
    volumes:
      # postgres:18 images moved the VOLUME up to /var/lib/postgresql (not .../data)
      - pg-data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d voicechat']
      interval: 5s
      timeout: 3s
      retries: 10

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    environment:
      DOMAIN: ${DOMAIN}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

  livekit:
    image: livekit/livekit-server:v1.13.2
    restart: unless-stopped
    # host networking: RTC media (UDP range) goes straight to the VPS interface,
    # no NAT between docker bridge and the internet
    network_mode: host
    environment:
      LIVEKIT_KEYS: '${NUXT_LIVEKIT_API_KEY}: ${NUXT_LIVEKIT_API_SECRET}'
    volumes:
      - ./deploy/livekit.yaml:/etc/livekit.yaml:ro
    command: --config /etc/livekit.yaml

volumes:
  app-data:
  pg-data:
  caddy-data:
  caddy-config:
